<!-- HUD -->
<text class="hud" x="30"  y="20" fill="#00e5ff">SCORE</text>
<text class="hud" x="30"  y="32" fill="#ffffff">04280</text>
<text class="hud" x="280" y="20" fill="#00e5ff" text-anchor="middle">HI-SCORE</text>
