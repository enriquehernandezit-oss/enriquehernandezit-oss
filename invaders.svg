<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Space Invaders animation</title>
<desc>A modern neon-styled Space Invaders animation with glowing aliens and a sleek player cannon</desc>
<style>
  .aliens-group {
    animation: march 1.6s steps(1, end) infinite;
  }
  @keyframes march {
    0%,49%  { transform: translateX(0px); }
    50%,100% { transform: translateX(14px); }
  }
  .alien-a { fill: #a259ff; }
  .alien-b { fill: #00e5ff; }
  .alien-c { fill: #00ff88; }
  .cannon { fill: #ffffff; }
  .bullet {
    fill: #ffffff;
    animation: fire 2s linear infinite;
  }
  @keyframes fire {
    0%   { transform: translateY(0);      opacity: 1; }
    70%  { transform: translateY(-115px); opacity: 1; }
    71%  { opacity: 0; }
    100% { transform: translateY(-115px); opacity: 0; }
  }
  .mystery {
    fill: #ff3860;
    animation: flyby 6s linear infinite;
  }
  @keyframes flyby {
    0%   { transform: translateX(620px); opacity: 0; }
    5%   { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateX(-80px); opacity: 0; }
  }
  .star { fill: #ffffff; }
  .star1 { animation: twinkle 2.1s ease-in-out infinite alternate; }
  .star2 { animation: twinkle 1.4s ease-in-out infinite alternate; }
  .star3 { animation: twinkle 3s ease-in-out infinite alternate; }
  @keyframes twinkle {
    from { opacity: 0.1; }
    to   { opacity: 0.9; }
  }
  .shield { fill: #00ff88; opacity: 0.7; }
  .hud { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; }
  .scanline {
    fill: none;
    stroke: rgba(255,255,255,0.03);
    stroke-width: 1;
  }
</style>

<rect width="680" height="200" fill="#080810" rx="0"/>

<!-- scanlines -->
<line class="scanline" x1="0" y1="10"  x2="680" y2="10"/>
<line class="scanline" x1="0" y1="20"  x2="680" y2="20"/>
<line class="scanline" x1="0" y1="30"  x2="680" y2="30"/>
<line class="scanline" x1="0" y1="40"  x2="680" y2="40"/>
